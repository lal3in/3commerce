# Optional PgBouncer overlay for bare-run/dev infrastructure (ADR-0032).
# Usage:
#   docker compose -f docker-compose.infra.yml -f docker-compose.infra.pgbouncer.yml --profile pgbouncer up -d
# Services still run on the host; point their ConnectionStrings:Database Host to localhost;Port=6432 if
# you want to exercise PgBouncer in bare-run mode.

services:
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: 3commerce-pgbouncer
    profiles: ["pgbouncer"]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./deploy/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./deploy/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    ports:
      - "6432:6432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 12
