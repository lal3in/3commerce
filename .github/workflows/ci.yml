name: ci

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      # true when the push/PR touches anything other than docs/markdown/agent notes
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!docs/**'
              - '!.ai-shared/**'
              - '!.claude/**'

  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore 3commerce.sln
      - name: Build
        run: dotnet build 3commerce.sln --no-restore
      - name: Format check
        run: dotnet format 3commerce.sln --verify-no-changes --no-restore
      - name: Unit tests
        run: dotnet test 3commerce.sln --no-build --filter Category!=Integration
      - name: Vulnerable package scan
        run: |
          dotnet list 3commerce.sln package --vulnerable --include-transitive > vulns.txt 2>&1 || true
          cat vulns.txt
          ! grep -q 'has the following vulnerable packages' vulns.txt

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Integration tests (Testcontainers)
        run: dotnet test tests/3commerce.IntegrationTests --filter Category=Integration

  browser-e2e:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Keep the catalog import small on the 2-vCPU runner (the 10k-event projection
      # storm starves the other processes). The full-scale import is asserted by the
      # CatalogSearchTests integration test, not here.
      Importer__TargetRows: "400"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/Storefront/package-lock.json
      - name: Install dotnet-ef
        run: |
          dotnet tool install --global dotnet-ef
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
      - name: Install storefront deps + Playwright (Chromium)
        working-directory: src/Storefront
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Build solution
        run: dotnet build 3commerce.sln
      - name: Full-stack browser E2E (boots the stack, runs L1–L20)
        run: scripts/e2e-verify.sh --live-only
      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: src/Storefront/test-results
          if-no-files-found: ignore

  docker:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dockerfile:
          - src/Gateway/Dockerfile
          - src/Workers/Notifications/Dockerfile
          - src/Services/Identity/Api/Dockerfile
          - src/Services/Catalog/Api/Dockerfile
          - src/Services/Ordering/Api/Dockerfile
          - src/Services/Payments/Api/Dockerfile
          - src/Services/Fulfillment/Api/Dockerfile
          - src/Services/Support/Api/Dockerfile
          - src/Admin/Dockerfile
          - src/Storefront/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - name: Docker build
        run: docker build -f ${{ matrix.dockerfile }} .
