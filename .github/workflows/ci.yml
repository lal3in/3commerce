name: ci

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    # dorny/paths-filter reads the PR diff via the API on pull_request events.
    permissions:
      contents: read
      pull-requests: read
    outputs:
      # true when the push/PR touches the build/test surface (not docs/markdown/notes).
      # Positive patterns only: dorny/paths-filter matches a file if it matches ANY
      # pattern, so a bare '**' + '!docs' negations would always be true — list the
      # code surface explicitly instead. A docs-only change matches none of these.
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'scripts/**'
              - 'infra/**'
              - '.github/workflows/**'
              - '**/*.sln'
              - '**/*.csproj'
              - '**/*.props'
              - '**/*.targets'
              - 'global.json'
              - 'docker-compose*.yml'
              - 'deploy/**'
              - '**/Dockerfile'

  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore 3commerce.sln
      - name: Build
        run: dotnet build 3commerce.sln --no-restore
      - name: Format check
        run: dotnet format 3commerce.sln --verify-no-changes --no-restore
      - name: Unit tests
        run: dotnet test 3commerce.sln --no-build --filter Category!=Integration
      - name: Vulnerable package scan
        run: |
          dotnet list 3commerce.sln package --vulnerable --include-transitive > vulns.txt 2>&1 || true
          cat vulns.txt
          ! grep -q 'has the following vulnerable packages' vulns.txt

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Integration tests (Testcontainers)
        run: dotnet test tests/3commerce.IntegrationTests --filter Category=Integration

  browser-e2e:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Keep the catalog import small on the 2-vCPU runner (the 10k-event projection
      # storm starves the other processes). The full-scale import is asserted by the
      # CatalogSearchTests integration test, not here.
      Importer__TargetRows: "400"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/Storefront/package-lock.json
      - name: Install dotnet-ef
        run: |
          dotnet tool install --global dotnet-ef
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
      - name: Install storefront deps + Playwright (Chromium)
        working-directory: src/Storefront
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Build solution
        run: dotnet build 3commerce.sln
      - name: Full-stack browser E2E (boots the stack, runs L1–L20)
        run: scripts/e2e-verify.sh --live-only
      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: src/Storefront/test-results
          if-no-files-found: ignore

  docker:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dockerfile:
          - src/Gateway/Dockerfile
          - src/Workers/Notifications/Dockerfile
          - src/Services/Identity/Api/Dockerfile
          - src/Services/Catalog/Api/Dockerfile
          - src/Services/Ordering/Api/Dockerfile
          - src/Services/Payments/Api/Dockerfile
          - src/Services/Fulfillment/Api/Dockerfile
          - src/Services/Support/Api/Dockerfile
          - src/Services/Entity/Api/Dockerfile
          - src/Services/Marketing/Api/Dockerfile
          - src/Admin/Dockerfile
          - src/Storefront/Dockerfile
          - src/SupplierPortal/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - name: Docker build
        run: docker build -f ${{ matrix.dockerfile }} .

  # Boot the real containerized stack (fresh dev) and smoke a journey through the gateway.
  compose-smoke:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Fresh launch (dev)
        run: scripts/launch.sh --fresh --env dev
      - name: Smoke the stack through the gateway
        run: |
          ok() { for i in $(seq 1 60); do [ "$(curl -s -o /dev/null -w '%{http_code}' "$1")" = "$2" ] && return 0; sleep 5; done; echo "FAIL $1 != $2"; return 1; }
          ok http://localhost:8080/health 200
          ok 'http://localhost:8080/api/catalog/products?pageSize=1' 200
          ok http://localhost:3000/ 200
          test "$(curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:8080/api/identity/register -H 'content-type: application/json' -d '{"email":"ci@test.com","password":"cipassword99"}')" = "202"
      - name: Logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml ps; docker compose -f docker-compose.yml logs --tail=60
      - name: Teardown
        if: always()
        run: |
          docker compose -f docker-compose.yml down --remove-orphans
          docker compose -f docker-compose.db.yml down -v --remove-orphans

  # Prove the Helm chart actually deploys: build images, load into kind, helm install, probe.
  kind-deploy:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2
      - name: Install kubeconform
        run: |
          curl -fsSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz | tar xz kubeconform
          sudo mv kubeconform /usr/local/bin/
      - name: Lint + static validate
        run: |
          helm lint deploy/helm/3commerce -f deploy/helm/3commerce/values-dev.yaml
          helm template 3commerce deploy/helm/3commerce -f deploy/helm/3commerce/values-dev.yaml | kubeconform -strict -summary
      - uses: helm/kind-action@v1
        with:
          cluster_name: 3c
      - name: Build images + load into kind
        run: |
          set -e
          declare -A df=( \
            [gateway]=src/Gateway/Dockerfile [admin]=src/Admin/Dockerfile \
            [storefront]=src/Storefront/Dockerfile [notifications]=src/Workers/Notifications/Dockerfile \
            [identity]=src/Services/Identity/Api/Dockerfile [catalog]=src/Services/Catalog/Api/Dockerfile \
            [ordering]=src/Services/Ordering/Api/Dockerfile [payments]=src/Services/Payments/Api/Dockerfile \
            [fulfillment]=src/Services/Fulfillment/Api/Dockerfile [support]=src/Services/Support/Api/Dockerfile \
            [entity]=src/Services/Entity/Api/Dockerfile [marketing]=src/Services/Marketing/Api/Dockerfile \
            [supplier-portal]=src/SupplierPortal/Dockerfile )
          for n in "${!df[@]}"; do docker build -f "${df[$n]}" -t 3commerce/$n:local . ; kind load docker-image 3commerce/$n:local --name 3c; done
          docker build -f deploy/migrator/Dockerfile -t 3commerce/migrator:local .
          kind load docker-image 3commerce/migrator:local --name 3c
      - name: helm install (dev) + wait
        run: helm install 3commerce deploy/helm/3commerce -f deploy/helm/3commerce/values-dev.yaml --wait --timeout 12m
      - name: Probe gateway
        run: |
          kubectl port-forward svc/gateway 18080:8080 >/dev/null 2>&1 &
          sleep 6
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:18080/health)" = "200"
          test "$(curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:18080/api/identity/register -H 'content-type: application/json' -d '{"email":"k8s@test.com","password":"k8spassword9"}')" = "202"
      - name: Diagnostics on failure
        if: failure()
        run: kubectl get pods -A -o wide; kubectl describe pods; kubectl logs -l app=gateway --tail=80 || true
