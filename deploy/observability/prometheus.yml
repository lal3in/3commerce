# Prometheus (mt6_13): scrapes the OTel Collector's Prometheus exporter, which aggregates the
# OTLP metrics pushed by every service. Ops data only — never financial truth.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
