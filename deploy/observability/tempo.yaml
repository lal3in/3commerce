# Tempo (monolithic, local-disk blocks) — local dev only. Receives OTLP from the collector
# on the compose network; Grafana queries the HTTP API on :3200.
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        # Tempo >= 2.6 binds receivers to localhost by default, which is unreachable from the
        # collector container — bind 0.0.0.0 explicitly.
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal

compactor:
  compaction:
    # Keep dev traces short-lived so the named volume can't grow unbounded.
    block_retention: 48h
