# OTel Collector (mt6_13): the single OTLP door for every service; fans each signal out to the
# LGTM stack — traces → Tempo, logs → Loki, metrics → Prometheus scrape + Mimir remote-write.
# Prometheus stays alongside Mimir because the existing RED dashboard queries it.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  prometheus:
    endpoint: 0.0.0.0:8889
    # Keep the service.name resource attribute as a label so dashboards can break down per service.
    resource_to_telemetry_conversion:
      enabled: true
  prometheusremotewrite:
    endpoint: http://mimir:9009/api/v1/push
    resource_to_telemetry_conversion:
      enabled: true
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true  # plain gRPC inside the compose network
  otlphttp/loki:
    # Loki 3 native OTLP ingest — no Loki exporter/promtail hop needed.
    endpoint: http://loki:3100/otlp

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, prometheusremotewrite]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/loki]
