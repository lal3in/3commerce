# Loki (single-binary, filesystem storage) — local dev only. No auth/multitenancy so the
# collector can push straight to /otlp and Grafana can query without headers; anything
# production-shaped needs object storage + tenants instead of this file.
auth_enabled: false

server:
  http_listen_port: 3100

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # OTLP-native ingest stores resource/log attributes (incl. trace_id) as structured
  # metadata — v13 schema + this flag are both required for the /otlp endpoint to accept data.
  allow_structured_metadata: true
