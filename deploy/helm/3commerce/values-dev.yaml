# Dev overlay: committed dev ES256 keys (baked into the images) are accepted because
# the environment is Development. No external Secret needed.
environment: Development
secret:
  name: ""

# kind-deploy runs on a 2-core CI runner that cannot hold all 13 services at once (Postgres + RabbitMQ
# saturate, readiness probes time out, migrate init-containers back off). Deploy a representative subset:
# the core services plus one additive (marketing) and one event-consuming (entitlement) new service —
# enough to prove the chart's per-service templating + the new-service pattern. The full set ships via
# values.yaml / values-prod.yaml; every service image is still built (CI docker matrix) and exercised
# end-to-end by the compose-smoke job.
services:
  - identity
  - catalog
  - entity
  - ordering
  - payments
  - fulfillment
  - support
  - marketing
  - entitlement
