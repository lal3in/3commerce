# Dev overlay: committed dev ES256 keys (baked into the images) are accepted because
# the environment is Development. No external Secret needed.
environment: Development
secret:
  name: ""

# kind-deploy runs on a 2-core CI runner. Deploying all 13 services saturates Postgres + RabbitMQ
# (concurrent migrate init-containers thundering-herd Postgres; health probes time out), so this overlay
# deploys the proven 7-service baseline that PR #11 deployed green — enough to prove the Helm chart, the
# per-service migrate init-container, gateway routing, and the frontends. The new services use the
# identical ranged template (services.yaml) + conn helper; they are validated by `helm template`, the CI
# docker matrix (every image builds), and the full 13-service compose-smoke + browser-e2e jobs. The full
# set ships via values.yaml / values-prod.yaml.
services:
  - identity
  - catalog
  - entity
  - ordering
  - payments
  - fulfillment
  - support
