# Notifications worker (no Service — event consumer), Admin and Storefront (with Services).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifications
  labels:
    app: notifications
    {{- include "3commerce.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notifications
  template:
    metadata:
      labels:
        app: notifications
    spec:
      containers:
        - name: notifications
          image: {{ include "3commerce.image" (dict "root" . "name" "notifications") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: USE_CONTAINER_CONFIG
              value: "true"
            - name: ASPNETCORE_ENVIRONMENT
              value: {{ .Values.environment | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  labels:
    app: admin
    {{- include "3commerce.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
    spec:
      containers:
        - name: admin
          image: {{ include "3commerce.image" (dict "root" . "name" "admin") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
            - name: USE_CONTAINER_CONFIG
              value: "true"
            - name: ASPNETCORE_ENVIRONMENT
              value: {{ .Values.environment | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: admin
  labels:
    app: admin
spec:
  selector:
    app: admin
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
