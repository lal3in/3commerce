{{- if .Values.observability.enabled }}
# Optional LGTM observability stack (off by default; `observability.enabled=true`) — the in-cluster
# mirror of the local docker-compose `observability` profile. One collector fans OTLP out per
# signal: traces → Tempo, logs → Loki (native /otlp ingest), metrics → Mimir remote-write. No
# Prometheus here — Mimir IS the PromQL endpoint (/prometheus). dev/kind convenience: emptyDir
# storage + no auth/multitenancy, so telemetry dies with the pod; prod wants the upstream charts.
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  labels:
    {{- include "3commerce.labels" . | nindent 4 }}
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch: {}
    exporters:
      prometheusremotewrite:
        endpoint: http://mimir:9009/api/v1/push
        # Keep service.name as a label so dashboards can break down per service.
        resource_to_telemetry_conversion:
          enabled: true
      otlp/tempo:
        endpoint: tempo:4317
        tls:
          insecure: true  # plain gRPC inside the cluster
      otlphttp/loki:
        endpoint: http://loki:3100/otlp
    service:
      pipelines:
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheusremotewrite]
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp/tempo]
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlphttp/loki]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  labels:
    {{- include "3commerce.labels" . | nindent 4 }}
data:
  config.yaml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
    common:
      instance_addr: 127.0.0.1
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    limits_config:
      # v13 schema + structured metadata are both required for the native /otlp endpoint.
      allow_structured_metadata: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  labels:
    {{- include "3commerce.labels" . | nindent 4 }}
data:
  config.yaml: |
    server:
      http_listen_port: 3200
    distributor:
      receivers:
        otlp:
          protocols:
            # Tempo >= 2.6 binds receivers to localhost by default — unreachable from the
            # collector pod, so bind 0.0.0.0 explicitly.
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/blocks
        wal:
          path: /var/tempo/wal
    compactor:
      compaction:
        block_retention: 48h
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mimir-config
  labels:
    {{- include "3commerce.labels" . | nindent 4 }}
data:
  config.yaml: |
    multitenancy_enabled: false
    server:
      # Mimir defaults to 8080, the app port convention here — use the Mimir demo port instead.
      http_listen_port: 9009
      log_level: warn
    common:
      storage:
        backend: filesystem
        filesystem:
          dir: /data/storage
    blocks_storage:
      storage_prefix: blocks
      tsdb:
        dir: /data/tsdb
    compactor:
      data_dir: /data/compactor
      sharding_ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: memberlist
    distributor:
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: memberlist
    ingester:
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: memberlist
        replication_factor: 1
    store_gateway:
      sharding_ring:
        instance_addr: 127.0.0.1
        replication_factor: 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  labels:
    app: otel-collector
    {{- include "3commerce.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: {{ .Values.observability.collector.image }}
          args: ["--config=/etc/otelcol/config.yaml"]
          ports:
            - containerPort: 4317
            - containerPort: 4318
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol/config.yaml
              subPath: config.yaml
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  labels:
    app: otel-collector
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  labels:
    app: loki
    {{- include "3commerce.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
        - name: loki
          image: {{ .Values.observability.loki.image }}
          args: ["-config.file=/etc/loki/config.yaml"]
          ports:
            - containerPort: 3100
          volumeMounts:
            - name: config
              mountPath: /etc/loki/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: data
              mountPath: /loki
          readinessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 12
      volumes:
        - name: config
          configMap:
            name: loki-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  labels:
    app: loki
spec:
  selector:
    app: loki
  ports:
    - port: 3100
      targetPort: 3100
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  labels:
    app: tempo
    {{- include "3commerce.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tempo
  template:
    metadata:
      labels:
        app: tempo
    spec:
      containers:
        - name: tempo
          image: {{ .Values.observability.tempo.image }}
          args: ["-config.file=/etc/tempo.yaml"]
          ports:
            - containerPort: 3200
            - containerPort: 4317
          volumeMounts:
            - name: config
              mountPath: /etc/tempo.yaml
              subPath: config.yaml
              readOnly: true
            - name: data
              mountPath: /var/tempo
          readinessProbe:
            httpGet:
              path: /ready
              port: 3200
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 12
      volumes:
        - name: config
          configMap:
            name: tempo-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
  labels:
    app: tempo
spec:
  selector:
    app: tempo
  ports:
    - name: http
      port: 3200
      targetPort: 3200
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mimir
  labels:
    app: mimir
    {{- include "3commerce.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mimir
  template:
    metadata:
      labels:
        app: mimir
    spec:
      containers:
        - name: mimir
          image: {{ .Values.observability.mimir.image }}
          args: ["-config.file=/etc/mimir.yaml"]
          ports:
            - containerPort: 9009
          volumeMounts:
            - name: config
              mountPath: /etc/mimir.yaml
              subPath: config.yaml
              readOnly: true
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /ready
              port: 9009
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 12
      volumes:
        - name: config
          configMap:
            name: mimir-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mimir
  labels:
    app: mimir
spec:
  selector:
    app: mimir
  ports:
    - port: 9009
      targetPort: 9009
{{- end }}
