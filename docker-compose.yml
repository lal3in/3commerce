# Full containerized launch (ADR-0021): all 10 app images + infra on one internal network.
# Drive it with scripts/launch.sh [--fresh|--reuse] [--env dev|prod] — do not invoke this
# file directly unless you know the env wiring. Bare-run dev stays in docker-compose.infra.yml
# + scripts/run-all.sh (ADR-0009).
name: 3commerce

x-app: &app
  environment:
    USE_CONTAINER_CONFIG: "true"
  env_file:
    - deploy/.env.${ENV:-dev}
  restart: unless-stopped

x-svc-health: &svc-health
  healthcheck:
    test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/ready || exit 1"]
    interval: 10s
    timeout: 3s
    retries: 12
    start_period: 25s

# Postgres is external (docker-compose.db.yml) — services gate on rabbitmq + the migrator,
# which itself depends on the external Postgres being reachable (ensured by scripts/launch.sh).
x-svc-deps: &svc-deps
  depends_on:
    rabbitmq: { condition: service_healthy }
    migrate: { condition: service_completed_successfully }

x-limits: &limits
  deploy:
    resources:
      limits:
        memory: 512M

services:
  rabbitmq:
    image: rabbitmq:4-management
    container_name: 3commerce-rabbitmq
    volumes:
      # Named, or the image's VOLUME /var/lib/rabbitmq leaks a new anonymous volume per recreate.
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  # One-shot: applies all service schemas via EF bundles to the EXTERNAL Postgres, then exits.
  # Gates the app services. scripts/launch.sh ensures Postgres is healthy before this runs.
  migrate:
    build:
      context: .
      dockerfile: deploy/migrator/Dockerfile
    environment:
      CONN_IDENTITY: Host=postgres;Port=5432;Database=identity_db;Username=identity_svc;Password=identity_dev
      CONN_CATALOG: Host=postgres;Port=5432;Database=catalog_db;Username=catalog_svc;Password=catalog_dev
      CONN_ENTITY: Host=postgres;Port=5432;Database=entity_db;Username=entity_svc;Password=entity_dev
      CONN_ORDERING: Host=postgres;Port=5432;Database=ordering_db;Username=ordering_svc;Password=ordering_dev
      CONN_PAYMENTS: Host=postgres;Port=5432;Database=payments_db;Username=payments_svc;Password=payments_dev
      CONN_FULFILLMENT: Host=postgres;Port=5432;Database=fulfillment_db;Username=fulfillment_svc;Password=fulfillment_dev
      CONN_SUPPORT: Host=postgres;Port=5432;Database=support_db;Username=support_svc;Password=support_dev
      CONN_MARKETING: Host=postgres;Port=5432;Database=marketing_db;Username=marketing_svc;Password=marketing_dev
      CONN_PRICING: Host=postgres;Port=5432;Database=pricing_db;Username=pricing_svc;Password=pricing_dev
      CONN_AUDIT: Host=postgres;Port=5432;Database=audit_db;Username=audit_svc;Password=audit_dev
      CONN_WORKFLOW: Host=postgres;Port=5432;Database=workflow_db;Username=workflow_svc;Password=workflow_dev
      CONN_ENTITLEMENT: Host=postgres;Port=5432;Database=entitlement_db;Username=entitlement_svc;Password=entitlement_dev
      CONN_USAGE: Host=postgres;Port=5432;Database=usage_db;Username=usage_svc;Password=usage_dev
    restart: "no"

  identity:
    <<: [*app, *svc-deps, *svc-health, *limits]
    build: { context: ., dockerfile: src/Services/Identity/Api/Dockerfile }
  catalog:
    <<: [*app, *svc-deps, *svc-health, *limits]
    build: { context: ., dockerfile: src/Services/Catalog/Api/Dockerfile }
  entity:
    <<: [*app, *svc-deps, *svc-health, *limits]
    build: { context: ., dockerfile: src/Services/Entity/Api/Dockerfile }
  ordering:
    <<: [*app, *svc-deps, *svc-health, *limits]
    build: { context: ., dockerfile: src/Services/Ordering/Api/Dockerfile }
  payments:
    <<: [*app, *svc-deps, *svc-health, *limits]
    build: { context: ., dockerfile: src/Services/Payments/Api/Dockerfile }
  fulfillment:
    <<: [*app, *svc-deps, *svc-health, *limits]
    build: { context: ., dockerfile: src/Services/Fulfillment/Api/Dockerfile }
  support:
    <<: [*app, *svc-deps, *svc-health, *limits]
    build: { context: ., dockerfile: src/Services/Support/Api/Dockerfile }
  marketing:
    <<: [*app, *svc-deps, *svc-health, *limits]
    build: { context: ., dockerfile: src/Services/Marketing/Api/Dockerfile }
  pricing:
    <<: [*app, *svc-deps, *svc-health, *limits]
    build: { context: ., dockerfile: src/Services/Pricing/Api/Dockerfile }
  audit:
    <<: [*app, *svc-deps, *svc-health, *limits]
    build: { context: ., dockerfile: src/Services/Audit/Api/Dockerfile }
  workflow:
    <<: [*app, *svc-deps, *svc-health, *limits]
    build: { context: ., dockerfile: src/Services/Workflow/Api/Dockerfile }
  entitlement:
    <<: [*app, *svc-deps, *svc-health, *limits]
    build: { context: ., dockerfile: src/Services/Entitlement/Api/Dockerfile }
  usage:
    <<: [*app, *svc-deps, *svc-health, *limits]
    build: { context: ., dockerfile: src/Services/Usage/Api/Dockerfile }

  notifications:
    <<: [*app, *limits]
    build: { context: ., dockerfile: src/Workers/Notifications/Dockerfile }
    depends_on:
      rabbitmq: { condition: service_healthy }

  gateway:
    <<: [*app, *limits]
    build: { context: ., dockerfile: src/Gateway/Dockerfile }
    ports:
      - "8080:8080"
    depends_on:
      identity: { condition: service_healthy }
      catalog: { condition: service_healthy }
      entity: { condition: service_healthy }
      ordering: { condition: service_healthy }
      payments: { condition: service_healthy }
      fulfillment: { condition: service_healthy }
      support: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 15s

  admin:
    <<: [*app, *limits]
    build: { context: ., dockerfile: src/Admin/Dockerfile }
    ports:
      - "5200:8080"
    depends_on:
      gateway: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 15s

  supplier-portal:
    <<: [*app, *limits]
    build: { context: ., dockerfile: src/SupplierPortal/Dockerfile }
    ports:
      - "5300:8080"
    depends_on:
      gateway: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 15s

  storefront:
    build: { context: ., dockerfile: src/Storefront/Dockerfile }
    environment:
      NODE_ENV: production
      GATEWAY_URL: http://gateway:8080
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      gateway: { condition: service_healthy }
    healthcheck:
      # 127.0.0.1 (not localhost): BusyBox wget resolves localhost to IPv6 [::1], but the
      # Next server binds IPv4 0.0.0.0 (Dockerfile HOSTNAME) — [::1] would be refused.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Kafka durable stream lane (ADR-0034) — opt-in dev profile: `docker compose --profile kafka up`.
  # RabbitMQ remains the operational bus; Kafka carries committed facts only.
  kafka:
    image: bitnami/kafka:3.9
    container_name: 3commerce-kafka
    profiles: ["kafka"]
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 25s
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: 3commerce-kafka-ui
    profiles: ["kafka"]
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8088:8080"
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ── Observability stack (mt6_13 + LGTM) — `docker compose --profile observability up`
  # (dev-up.sh does this on every start). One collector fans OTLP out per signal: traces → Tempo,
  # logs → Loki (native /otlp ingest), metrics → Prometheus scrape + Mimir remote-write; Grafana
  # fronts all four with provisioned datasources + trace↔log links. Services push OTLP when
  # OTEL_EXPORTER_OTLP_ENDPOINT is set — containerized: http://otel-collector:4317 (deploy/.env.*);
  # bare-run: http://localhost:4317 via the published collector ports (scripts/run-all.sh sets it).
  # Ops data only — never financial truth; keep Grafana behind admin auth / a private network (GOTCHA).
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    container_name: 3commerce-otel-collector
    profiles: ["observability"]
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      - "4317:4317"    # OTLP gRPC — bare-run services (ADR-0009) can only reach a published port
      - "4318:4318"    # OTLP HTTP
    volumes:
      - ./deploy/observability/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    depends_on:
      - loki
      - tempo
      - mimir
    restart: unless-stopped

  loki:
    image: grafana/loki:3.3.2
    container_name: 3commerce-loki
    profiles: ["observability"]
    command: ["-config.file=/etc/loki/config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - ./deploy/observability/loki.yaml:/etc/loki/config.yaml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.6.1
    container_name: 3commerce-tempo
    profiles: ["observability"]
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "3200:3200"    # HTTP query API; OTLP 4317/4318 stay compose-internal (collector-only)
    volumes:
      - ./deploy/observability/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3200/ready >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  mimir:
    image: grafana/mimir:2.14.1
    container_name: 3commerce-mimir
    profiles: ["observability"]
    command: ["-config.file=/etc/mimir.yaml"]
    ports:
      - "9009:9009"
    volumes:
      - ./deploy/observability/mimir.yaml:/etc/mimir.yaml:ro
      - mimir_data:/data
    # No healthcheck: the mimir image is shell-less (no /bin/sh, wget, or curl) — probe
    # http://localhost:9009/ready from the host instead.
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: 3commerce-prometheus
    profiles: ["observability"]
    volumes:
      - ./deploy/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # Same anonymous-volume leak as rabbitmq (the image declares VOLUME /prometheus), and without
      # it the scrape history dies with the container while Loki/Tempo/Mimir keep theirs.
      - prometheus_data:/prometheus
    depends_on:
      - otel-collector
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: 3commerce-grafana
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
      - tempo
      - mimir
    restart: unless-stopped

# Telemetry survives observability-stack restarts (plain `down` keeps named volumes). Every
# stateful service here is named on purpose: an unmapped image VOLUME silently orphans a fresh
# anonymous volume on each recreate, which accumulates as unattributable disk.
volumes:
  loki_data:
  tempo_data:
  mimir_data:
  prometheus_data:
  rabbitmq_data:

# The app's default network IS the external Postgres network (docker-compose.db.yml), so
# every app container plus the external `postgres` resolve each other by name.
networks:
  default:
    name: 3commerce-data
    external: true
